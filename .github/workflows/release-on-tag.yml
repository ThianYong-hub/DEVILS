name: Release From Tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag in format vX.Y.Z"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Resolve Release Tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail

          tag_value="${{ inputs.tag }}"

          if [[ ! "${tag_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag '${tag_value}'. Expected format vX.Y.Z."
            exit 1
          fi

          echo "release_tag=${tag_value}" >> "${GITHUB_OUTPUT}"

      - name: Set APP_VERSION From Tag
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          app_version="${{ steps.resolve_tag.outputs.release_tag }}"
          app_version="${app_version#v}"
          echo "APP_VERSION=${app_version}" >> "${GITHUB_ENV}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build with Gradle
        run: ./gradlew --no-daemon build -x test

      - name: Prepare release artifact name
        id: prepare_asset
        shell: bash
        run: |
          set -euo pipefail

          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' | head -n1)"
          if [[ -z "${jar_path}" ]]; then
            echo "::error::No .jar artifact found in build/libs."
            exit 1
          fi

          asset_path="build/libs/devils-addon-${{ steps.app_version.outputs.app_version }}.jar"
          if [[ "${jar_path}" != "${asset_path}" ]]; then
            cp "${jar_path}" "${asset_path}"
          fi

          echo "release_asset=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${{ steps.resolve_tag.outputs.release_tag }}"
          prev_tag="$(
            git tag -l 'v*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | awk -v current="${current_tag}" '
                  $0 == current { print prev; found=1; exit }
                  { prev=$0 }
                  END { if (!found) print prev }
                '
          )"

          if [[ -n "${prev_tag}" ]]; then
            range="${prev_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          export CURRENT_TAG="${current_tag}"
          export PREV_TAG="${prev_tag}"
          export RANGE="${range}"
          export REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          python3 - <<'PY'
          import os
          import re
          import subprocess
          from collections import OrderedDict
          from pathlib import Path

          current_tag = os.environ["CURRENT_TAG"]
          prev_tag = os.environ.get("PREV_TAG", "")
          commit_range = os.environ["RANGE"]
          repo_url = os.environ["REPO_URL"]

          def run(cmd):
              return subprocess.check_output(cmd, text=True, encoding="utf-8", errors="replace")

          def sentence_case(text):
              text = re.sub(r"\s+", " ", text).strip()
              if not text:
                  return text
              return text[0].upper() + text[1:]

          component_aliases = {
              "auto-cev": "AutoCev",
              "auto-wasp": "AutoWasp",
              "anti-wasp": "AntiWasp",
              "highwaybuilder": "HighwayBuilder",
          }

          def prettify_component(raw):
              raw = raw.strip()
              if not raw:
                  return ""

              lowered = raw.lower()
              if lowered in component_aliases:
                  return component_aliases[lowered]

              if any(ch.isupper() for ch in raw[1:]):
                  return raw

              pieces = [p for p in re.split(r"[^a-zA-Z0-9]+", raw) if p]
              if not pieces:
                  return raw
              return "".join(piece[:1].upper() + piece[1:] for piece in pieces)

          def get_changed_files(full_sha):
              try:
                  raw_files = run(["git", "show", "--name-status", "--format=", full_sha]).splitlines()
              except subprocess.CalledProcessError:
                  raw_files = []

              changed_files = []
              for entry in raw_files:
                  entry = entry.strip()
                  if not entry:
                      continue

                  parts = entry.split("\t")
                  status = parts[0]
                  path = parts[-1].strip() if len(parts) > 1 else ""
                  if not path:
                      continue
                  changed_files.append((status, path))
              return changed_files

          def infer_components(changed_files):
              components = []
              new_modules = []
              for changed in changed_files:
                  status, path = changed

                  if path.startswith("src/main/java/com/example/addon/modules/"):
                      module_name = Path(path).stem
                      components.append(module_name)
                      if status.startswith("A"):
                          new_modules.append(module_name)
                  elif path.startswith("src/main/java/com/example/addon/mixin/"):
                      components.append("Mixins")
                  elif path.startswith(".github/workflows/"):
                      components.append("Release workflow")
                  elif path.startswith("docs/") or path == "README.md":
                      components.append("Documentation")
                  elif path.startswith("src/main/resources/"):
                      components.append("Resources")

              unique = []
              seen = set()
              for component in components:
                  pretty = prettify_component(component)
                  if not pretty or pretty in seen:
                      continue
                  seen.add(pretty)
                  unique.append(pretty)
              unique_new_modules = []
              seen_new = set()
              for component in new_modules:
                  pretty = prettify_component(component)
                  if not pretty or pretty in seen_new:
                      continue
                  seen_new.add(pretty)
                  unique_new_modules.append(pretty)
              return unique, unique_new_modules

          def trim_components(components):
              generic = {"Mixins", "Resources", "Documentation", "Release workflow"}
              if any(component not in generic for component in components):
                  return [component for component in components if component not in generic]
              return components

          def format_commit_line(subject, scope, inferred_components):
              cleaned = sentence_case(subject)
              components = []

              if scope:
                  pretty_scope = prettify_component(scope)
                  if pretty_scope:
                      components.append(pretty_scope)

              for component in inferred_components:
                  if component not in components:
                      components.append(component)

              components = trim_components(components)
              if components:
                  return f"{', '.join(components)}: {cleaned}", components
              return cleaned, components

          def build_player_highlight(kind, components, cleaned_subject):
              lowered = cleaned_subject.lower()
              primary = components[0] if components else ""

              if primary == "AutoCev" and "cycle planning" in lowered and "instamine" in lowered:
                  return (
                      "More reliable cycle planning and instamine handling. "
                      "This should reduce stalls during Cev sequences and make switching targets or bases cleaner."
                  )

              if primary == "AutoWasp" and "nether flight" in lowered and "pathfinding load" in lowered:
                  return (
                      "Stays below the Nether roof limit and uses lighter pathfinding. "
                      "This should reduce upward-stuck behavior and route-calculation lag on weaker PCs."
                  )

              if primary == "HighwayBuilder" and "junk" in lowered and "restock" in lowered:
                  return (
                      "Handles junk cleanup and restocking more safely. "
                      "This should reduce failed build cycles and inventory hiccups."
                  )

              if "reduce pathfinding load" in lowered:
                  return (
                      "Lighter pathfinding work. "
                      "This should reduce route-calculation lag on weaker PCs."
                  )

              if "instamine" in lowered:
                  return (
                      "Improved instamine handling. "
                      "This should make block-breaking flow more reliable during combat."
                  )

              if kind == "fix":
                  if primary:
                      return "Bug fixes aimed at making the module more reliable in normal use."
                  return "Bug fixes aimed at improving reliability during normal play."

              if kind in ("refactor", "perf"):
                  if primary:
                      return "Under-the-hood improvements aimed at better stability and smoother behavior."
                  return "Under-the-hood improvements aimed at better stability and smoother behavior."

              if kind == "feat":
                  if primary:
                      return "New behavior or expanded functionality for the module."
                  return "New behavior or expanded functionality in this release."

              return ""

          def build_new_module_highlight(component, cleaned_subject):
              lowered = cleaned_subject.lower()
              if component == "AutoCev":
                  return (
                      "New module or major module addition. "
                      "Adds automated Cev-style pressure with obsidian, crystal, and instamine cycle handling."
                  )
              if component == "AutoWasp":
                  return (
                      "New module or major module addition. "
                      "Adds automated elytra pursuit with obstacle-aware routing."
                  )
              if component == "AntiWasp":
                  return (
                      "New module or major module addition. "
                      "Adds evasive elytra movement patterns to make wasp-style pursuit less effective."
                  )
              return (
                  f"New module added for {component}. "
                  "See the technical notes below for the implementation details."
              )

          def push_unique(grouped, key, value):
              if not value:
                  return
              grouped.setdefault(key, [])
              if value not in grouped[key]:
                  grouped[key].append(value)

          def normalize_kind(kind, cleaned_subject):
              lowered = cleaned_subject.lower()
              if kind == "feat" and lowered.startswith((
                  "refactor ",
                  "rework ",
                  "improve ",
                  "optimize ",
                  "reduce ",
                  "cleanup ",
                  "clean up ",
              )):
                  return "refactor"
              return kind

          try:
              raw = run(["git", "log", "--no-merges", "--pretty=%H%x09%h%x09%s", commit_range]).splitlines()
          except subprocess.CalledProcessError:
              raw = []

          ignore_patterns = [
              r"^docs:\s*sync readme download link\b",
              r"^auto_sync_",
              r"^switch_readme_sync",
              r"^fix_readme_sync",
          ]

          technical_groups = {
              "Features": [],
              "Fixes": [],
              "Improvements": [],
              "Documentation": [],
              "Maintenance": []
          }
          module_updates = OrderedDict()
          new_module_updates = OrderedDict()
          general_updates = []
          included_commits = 0

          prefix_re = re.compile(
              r"^(?P<kind>feat|fix|refactor|perf|docs|build|ci|chore|test)(?:\((?P<scope>[^)]+)\))?:\s*(?P<subject>.+)$",
              re.IGNORECASE
          )

          for line in raw:
              if line.count("\t") < 2:
                  continue

              full_sha, short_sha, subject = line.split("\t", 2)
              full_sha = full_sha.strip()
              short_sha = short_sha.strip()
              subject = subject.strip()
              if not full_sha or not short_sha or not subject:
                  continue

              lowered = subject.lower()
              if any(re.search(p, lowered) for p in ignore_patterns):
                  continue

              match = prefix_re.match(subject)
              scope = ""
              kind = "maintenance"
              cleaned_subject = subject
              if match:
                  scope = (match.group("scope") or "").strip()
                  kind = match.group("kind").lower()
                  cleaned_subject = match.group("subject").strip()

              kind = normalize_kind(kind, cleaned_subject)

              changed_files = get_changed_files(full_sha)
              inferred_components, new_modules = infer_components(changed_files)
              formatted, components = format_commit_line(cleaned_subject, scope, inferred_components)
              item = f"- {formatted} ([{short_sha}]({repo_url}/commit/{full_sha}))"
              player_highlight = build_player_highlight(kind, components, cleaned_subject)

              included_commits += 1

              if new_modules:
                  for component in new_modules:
                      push_unique(new_module_updates, component, build_new_module_highlight(component, cleaned_subject))
              elif components:
                  for component in components:
                      push_unique(module_updates, component, player_highlight)
              elif player_highlight:
                  if player_highlight not in general_updates:
                      general_updates.append(player_highlight)

              if kind == "feat":
                  technical_groups["Features"].append(item)
              elif kind == "fix":
                  technical_groups["Fixes"].append(item)
              elif kind in ("refactor", "perf"):
                  technical_groups["Improvements"].append(item)
              elif kind == "docs":
                  technical_groups["Documentation"].append(item)
              else:
                  technical_groups["Maintenance"].append(item)

          lines = []
          lines.append(f"## {current_tag}")
          lines.append("")

          if prev_tag:
              lines.append(f"Changes since **{prev_tag}**.")
          else:
              lines.append("Initial tagged release changes.")
          lines.append("")

          if included_commits:
              lines.append("### Highlights")
              lines.append(f"- Included commits: {included_commits}")
              if new_module_updates:
                  lines.append(f"- New modules: {len(new_module_updates)}")
              if module_updates:
                  lines.append(f"- Updated modules: {', '.join(module_updates.keys())}")
              lines.append("")

          if new_module_updates:
              lines.append("### New Modules")
              for component, updates in new_module_updates.items():
                  lines.append(f"**{component}**")
                  for update in updates:
                      lines.append(f"- {update}")
                  lines.append("")

          if module_updates:
              lines.append("### Module Updates")
              for component, updates in module_updates.items():
                  lines.append(f"**{component}**")
                  for update in updates:
                      lines.append(f"- {update}")
                  lines.append("")

          if general_updates:
              lines.append("### General Improvements")
              for update in general_updates:
                  lines.append(f"- {update}")
              lines.append("")

          written_any = False
          for title in ("Features", "Fixes", "Improvements", "Documentation", "Maintenance"):
              entries = technical_groups[title]
              if not entries:
                  continue
              written_any = True
              lines.append(f"### Technical Notes: {title}")
              lines.extend(entries)
              lines.append("")

          if not written_any:
              lines.append("### Maintenance")
              lines.append("- Maintenance release.")
              lines.append("")

          if prev_tag:
              lines.append("### Full Changelog")
              lines.append(f"[{prev_tag}...{current_tag}]({repo_url}/compare/{prev_tag}...{current_tag})")
              lines.append("")

          Path("RELEASE_NOTES.md").write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ steps.resolve_tag.outputs.release_tag }}
          path: ${{ steps.prepare_asset.outputs.release_asset }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          name: Release ${{ steps.resolve_tag.outputs.release_tag }}
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          files: ${{ steps.prepare_asset.outputs.release_asset }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync README Links On Default Branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.release_tag }}
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch }}"
          git fetch origin "${default_branch}"
          git checkout -B "readme-sync-${RELEASE_TAG}" "origin/${default_branch}"

          python3 - <<'PY'
          import glob
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          version = release_tag[1:]
          new_url = f"https://github.com/ThianYong-hub/DEVILS/releases/download/{release_tag}/devils-addon-{version}.jar"

          files = [Path("README.md")] + [Path(p) for p in glob.glob("docs/i18n/*.md")]
          url_re = re.compile(r"https://github\.com/ThianYong-hub/DEVILS/releases/download/v\d+\.\d+\.\d+/devils-addon-\d+\.\d+\.\d+\.jar")
          ver_plain_re = re.compile(r"\(v\d+\.\d+\.\d+\)")
          ver_backtick_re = re.compile(r"\(`v\d+\.\d+\.\d+`\)")

          for file in files:
            if not file.exists():
              continue
            text = file.read_text(encoding="utf-8")
            text = url_re.sub(new_url, text)
            text = ver_backtick_re.sub(f"(`v{version}`)", text)
            text = ver_plain_re.sub(f"(v{version})", text)
            file.write_text(text, encoding="utf-8")
          PY

          if git diff --quiet; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/i18n/*.md
          git commit -m "docs: sync README download link for ${RELEASE_TAG}"
          git push origin "HEAD:${default_branch}"
