name: Release From Tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag in format vX.Y.Z"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Resolve Release Tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail

          tag_value="${{ inputs.tag }}"

          if [[ ! "${tag_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag '${tag_value}'. Expected format vX.Y.Z."
            exit 1
          fi

          echo "release_tag=${tag_value}" >> "${GITHUB_OUTPUT}"

      - name: Set APP_VERSION From Tag
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          app_version="${{ steps.resolve_tag.outputs.release_tag }}"
          app_version="${app_version#v}"
          echo "APP_VERSION=${app_version}" >> "${GITHUB_ENV}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build with Gradle
        run: ./gradlew --no-daemon build -x test

      - name: Prepare release artifact name
        id: prepare_asset
        shell: bash
        run: |
          set -euo pipefail

          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' | head -n1)"
          if [[ -z "${jar_path}" ]]; then
            echo "::error::No .jar artifact found in build/libs."
            exit 1
          fi

          asset_path="build/libs/devils-addon-${{ steps.app_version.outputs.app_version }}.jar"
          if [[ "${jar_path}" != "${asset_path}" ]]; then
            cp "${jar_path}" "${asset_path}"
          fi

          echo "release_asset=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${{ steps.resolve_tag.outputs.release_tag }}"
          prev_tag="$(
            git tag -l 'v*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | awk -v current="${current_tag}" '
                  $0 == current { print prev; found=1; exit }
                  { prev=$0 }
                  END { if (!found) print prev }
                '
          )"

          if [[ -n "${prev_tag}" ]]; then
            range="${prev_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          {
            echo "## ${current_tag}"
            echo
            if [[ -n "${prev_tag}" ]]; then
              echo "Changes since ${prev_tag}:"
            else
              echo "Changes:"
            fi
            echo
            git log --no-merges --pretty='- %s (%h)' "${range}" || true
          } > RELEASE_NOTES.md

          if ! grep -q '^- ' RELEASE_NOTES.md; then
            {
              echo "## ${current_tag}"
              echo
              echo "- Maintenance release."
            } > RELEASE_NOTES.md
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ steps.resolve_tag.outputs.release_tag }}
          path: ${{ steps.prepare_asset.outputs.release_asset }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          name: Release ${{ steps.resolve_tag.outputs.release_tag }}
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          files: ${{ steps.prepare_asset.outputs.release_asset }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
