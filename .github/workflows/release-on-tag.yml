name: Release From Tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag in format vX.Y.Z"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Resolve Release Tag
        id: resolve_tag
        shell: bash
        run: |
          set -euo pipefail

          tag_value="${{ inputs.tag }}"

          if [[ ! "${tag_value}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag '${tag_value}'. Expected format vX.Y.Z."
            exit 1
          fi

          echo "release_tag=${tag_value}" >> "${GITHUB_OUTPUT}"

      - name: Set APP_VERSION From Tag
        id: app_version
        shell: bash
        run: |
          set -euo pipefail
          app_version="${{ steps.resolve_tag.outputs.release_tag }}"
          app_version="${app_version#v}"
          echo "APP_VERSION=${app_version}" >> "${GITHUB_ENV}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build with Gradle
        run: ./gradlew --no-daemon build -x test

      - name: Prepare release artifact name
        id: prepare_asset
        shell: bash
        run: |
          set -euo pipefail

          jar_path="$(find build/libs -maxdepth 1 -type f -name '*.jar' | head -n1)"
          if [[ -z "${jar_path}" ]]; then
            echo "::error::No .jar artifact found in build/libs."
            exit 1
          fi

          asset_path="build/libs/devils-addon-${{ steps.app_version.outputs.app_version }}.jar"
          if [[ "${jar_path}" != "${asset_path}" ]]; then
            cp "${jar_path}" "${asset_path}"
          fi

          echo "release_asset=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          current_tag="${{ steps.resolve_tag.outputs.release_tag }}"
          prev_tag="$(
            git tag -l 'v*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | awk -v current="${current_tag}" '
                  $0 == current { print prev; found=1; exit }
                  { prev=$0 }
                  END { if (!found) print prev }
                '
          )"

          if [[ -n "${prev_tag}" ]]; then
            range="${prev_tag}..${current_tag}"
          else
            range="${current_tag}"
          fi

          export CURRENT_TAG="${current_tag}"
          export PREV_TAG="${prev_tag}"
          export RANGE="${range}"
          export REPO_URL="${{ github.server_url }}/${{ github.repository }}"

          python3 - <<'PY'
          import os
          import re
          import subprocess
          from collections import OrderedDict
          from pathlib import Path

          current_tag = os.environ["CURRENT_TAG"]
          prev_tag = os.environ.get("PREV_TAG", "")
          commit_range = os.environ["RANGE"]
          repo_url = os.environ["REPO_URL"]

          def run(cmd):
              return subprocess.check_output(cmd, text=True, encoding="utf-8", errors="replace")

          def sentence_case(text):
              text = re.sub(r"\s+", " ", text).strip()
              if not text:
                  return text
              return text[0].upper() + text[1:]

          component_aliases = {
              "auto-cev": "AutoCev",
              "auto-wasp": "AutoWasp",
              "anti-wasp": "AntiWasp",
              "highwaybuilder": "HighwayBuilder",
          }
          generic_scopes = {
              "addon",
              "addons",
              "combat",
              "misc",
              "module",
              "modules",
              "release",
          }

          def prettify_component(raw):
              raw = raw.strip()
              if not raw:
                  return ""

              lowered = raw.lower()
              if lowered in component_aliases:
                  return component_aliases[lowered]

              if any(ch.isupper() for ch in raw[1:]):
                  return raw

              pieces = [p for p in re.split(r"[^a-zA-Z0-9]+", raw) if p]
              if not pieces:
                  return raw
              return "".join(piece[:1].upper() + piece[1:] for piece in pieces)

          def get_changed_files(full_sha):
              try:
                  raw_files = run(["git", "show", "--name-status", "--format=", full_sha]).splitlines()
              except subprocess.CalledProcessError:
                  raw_files = []

              changed_files = []
              for entry in raw_files:
                  entry = entry.strip()
                  if not entry:
                      continue

                  parts = entry.split("\t")
                  status = parts[0]
                  path = parts[-1].strip() if len(parts) > 1 else ""
                  if not path:
                      continue
                  changed_files.append((status, path))
              return changed_files

          def infer_components(changed_files):
              components = []
              new_modules = []
              for changed in changed_files:
                  status, path = changed

                  if path.startswith("src/main/java/com/example/addon/modules/"):
                      module_name = Path(path).stem
                      components.append(module_name)
                      if status.startswith("A"):
                          new_modules.append(module_name)
                  elif path.startswith("src/main/java/com/example/addon/mixin/"):
                      components.append("Mixins")
                  elif path.startswith(".github/workflows/"):
                      components.append("Release workflow")
                  elif path.startswith("docs/") or path == "README.md":
                      components.append("Documentation")
                  elif path.startswith("src/main/resources/"):
                      components.append("Resources")

              unique = []
              seen = set()
              for component in components:
                  pretty = prettify_component(component)
                  if not pretty or pretty in seen:
                      continue
                  seen.add(pretty)
                  unique.append(pretty)
              unique_new_modules = []
              seen_new = set()
              for component in new_modules:
                  pretty = prettify_component(component)
                  if not pretty or pretty in seen_new:
                      continue
                  seen_new.add(pretty)
                  unique_new_modules.append(pretty)
              return unique, unique_new_modules

          def trim_components(components):
              generic = {"Mixins", "Resources", "Documentation", "Release workflow"}
              if any(component not in generic for component in components):
                  return [component for component in components if component not in generic]
              return components

          def format_commit_line(subject, scope, inferred_components):
              cleaned = sentence_case(subject)
              components = []

              if scope and not (inferred_components and scope.strip().lower() in generic_scopes):
                  pretty_scope = prettify_component(scope)
                  if pretty_scope:
                      components.append(pretty_scope)

              for component in inferred_components:
                  if component not in components:
                      components.append(component)

              components = trim_components(components)
              if components:
                  return f"{', '.join(components)}: {cleaned}", components
              return cleaned, components

          def build_module_update(kind, component, cleaned_subject):
              lowered = cleaned_subject.lower()

              if component == "AutoCev" and "cycle planning" in lowered and "instamine" in lowered:
                  return {
                      "intro": "AutoCev got a reliability-focused update in this release.",
                      "changes": "Cycle planning and instamine state handling were cleaned up.",
                      "impact": "This should reduce stalls during Cev sequences and make switching targets or bases cleaner.",
                      "result": "AutoCev should feel smoother and waste fewer openings mid-fight.",
                  }

              if component == "AutoWasp" and "nether flight" in lowered and "pathfinding load" in lowered:
                  return {
                      "intro": "AutoWasp got a stability and performance pass.",
                      "changes": "It now respects the Nether roof limit and uses lighter pathfinding logic.",
                      "impact": "This should reduce upward-stuck behavior and route-calculation lag on weaker PCs.",
                      "result": "Pursuit should be more stable in the Nether and less expensive to run.",
                  }

              if component == "AutoCev" and "auto-cev planning" in lowered:
                  return {
                      "intro": "AutoCev got a combat-flow update.",
                      "changes": "Face and blocker planning were tightened up, including cleaner handling for blocked face cycles.",
                      "impact": "This should make target selection and cycle continuation more reliable in cramped fights.",
                      "result": "AutoCev should stall less and recover cleaner when a setup is partially blocked.",
                  }

              if component == "AutoWasp" and "auto-wasp swapping" in lowered:
                  return {
                      "intro": "AutoWasp got a close-range swap update.",
                      "changes": "It can now tell AutoArmor to swap between elytra and chestplate when you are close enough to commit on stable ground.",
                      "impact": "This should make bedrock-level pressure more practical without forcing awkward swaps while you are still flying over open space.",
                      "result": "AutoWasp should transition into close-range fights more naturally.",
                  }

              if component == "HighwayBuilder" and "junk" in lowered and "restock" in lowered:
                  return {
                      "intro": "HighwayBuilder got a reliability update.",
                      "changes": "Junk cleanup and restocking flow were tightened up.",
                      "impact": "This should reduce failed build cycles and inventory hiccups.",
                      "result": "Highway runs should need less babysitting.",
                  }

              if "instamine" in lowered:
                  return {
                      "intro": f"{component} got a mining-flow update." if component else "This release includes a mining-flow update.",
                      "changes": "Instamine handling was improved.",
                      "impact": "This should make block-breaking flow more reliable during combat.",
                      "result": "",
                  }

              if "reduce pathfinding load" in lowered:
                  return {
                      "intro": f"{component} got a performance-focused update." if component else "This release includes a performance-focused update.",
                      "changes": "Pathfinding work was reduced.",
                      "impact": "This should lower route-calculation lag on weaker PCs.",
                      "result": "",
                  }

              if kind == "fix":
                  return {
                      "intro": f"{component} got a bug-fix pass." if component else "This release includes bug fixes.",
                      "changes": "Reliability issues were addressed.",
                      "impact": "This should make normal use more consistent.",
                      "result": "",
                  }

              if kind in ("refactor", "perf"):
                  return {
                      "intro": f"{component} got an under-the-hood update." if component else "This release includes under-the-hood improvements.",
                      "changes": "Internal logic was cleaned up for stability and smoother behavior.",
                      "impact": "This should make the module feel more consistent during normal use.",
                      "result": "",
                  }

              if kind == "feat":
                  return {
                      "intro": f"{component} got new functionality in this release." if component else "This release adds new functionality.",
                      "changes": "The module gained new behavior or expanded options.",
                      "impact": "This should give you more flexibility in actual gameplay.",
                      "result": "",
                  }

              return None

          def build_new_module_highlight(component, cleaned_subject):
              if component == "AutoCev":
                  return {
                      "intro": "New module.",
                      "changes": "Adds automated Cev-style pressure with obsidian, crystal, and instamine cycle handling.",
                      "impact": "This gives you a ready-to-use aggressive Cev flow instead of doing the sequence manually.",
                      "result": "",
                  }
              if component == "AutoWasp":
                  return {
                      "intro": "New module.",
                      "changes": "Adds automated elytra pursuit with obstacle-aware routing.",
                      "impact": "This is meant to keep pressure on moving targets without flying straight into terrain.",
                      "result": "",
                  }
              if component == "AntiWasp":
                  return {
                      "intro": "New module.",
                      "changes": "Adds evasive elytra movement patterns to make wasp-style pursuit less effective.",
                      "impact": "This is meant to make you harder to chase or line up in the air.",
                      "result": "",
                  }
              return {
                  "intro": "New module.",
                  "changes": f"Adds {component} to the addon.",
                  "impact": "See the technical notes below for the implementation details.",
                  "result": "",
              }

          def push_unique(grouped, key, value):
              if not value:
                  return
              grouped.setdefault(key, [])
              if value not in grouped[key]:
                  grouped[key].append(value)

          def render_update_section(lines, title, updates):
              if not updates:
                  return

              lines.append(f"### {title}")
              for component, entries in updates.items():
                  lines.append(f"**{component}**")
                  for entry in entries:
                      intro = entry.get("intro", "").strip()
                      changes = entry.get("changes", "").strip()
                      impact = entry.get("impact", "").strip()
                      result = entry.get("result", "").strip()

                      if intro:
                          lines.append(intro)
                      if changes:
                          lines.append(f"- What changed: {changes}")
                      if impact:
                          lines.append(f"- Why it matters: {impact}")
                      if result:
                          lines.append(f"- Overall: {result}")
                      lines.append("")

          def normalize_kind(kind, cleaned_subject):
              lowered = cleaned_subject.lower()
              if kind == "feat" and lowered.startswith((
                  "refactor ",
                  "rework ",
                  "improve ",
                  "optimize ",
                  "reduce ",
                  "cleanup ",
                  "clean up ",
              )):
                  return "refactor"
              return kind

          try:
              raw = run(["git", "log", "--no-merges", "--pretty=%H%x09%h%x09%s", commit_range]).splitlines()
          except subprocess.CalledProcessError:
              raw = []

          ignore_patterns = [
              r"^docs:\s*sync readme download link\b",
              r"^auto_sync_",
              r"^switch_readme_sync",
              r"^fix_readme_sync",
              r"^ci\(release\):",
          ]

          technical_groups = {
              "Features": [],
              "Fixes": [],
              "Improvements": [],
              "Documentation": [],
              "Maintenance": []
          }
          module_updates = OrderedDict()
          new_module_updates = OrderedDict()
          general_updates = []
          included_commits = 0

          prefix_re = re.compile(
              r"^(?P<kind>feat|fix|refactor|perf|docs|build|ci|chore|test)(?:\((?P<scope>[^)]+)\))?:\s*(?P<subject>.+)$",
              re.IGNORECASE
          )

          for line in raw:
              if line.count("\t") < 2:
                  continue

              full_sha, short_sha, subject = line.split("\t", 2)
              full_sha = full_sha.strip()
              short_sha = short_sha.strip()
              subject = subject.strip()
              if not full_sha or not short_sha or not subject:
                  continue

              lowered = subject.lower()
              if any(re.search(p, lowered) for p in ignore_patterns):
                  continue

              match = prefix_re.match(subject)
              scope = ""
              kind = "maintenance"
              cleaned_subject = subject
              if match:
                  scope = (match.group("scope") or "").strip()
                  kind = match.group("kind").lower()
                  cleaned_subject = match.group("subject").strip()

              kind = normalize_kind(kind, cleaned_subject)

              changed_files = get_changed_files(full_sha)
              inferred_components, new_modules = infer_components(changed_files)
              if inferred_components and all(component in {"Documentation", "Release workflow"} for component in inferred_components):
                  continue
              formatted, components = format_commit_line(cleaned_subject, scope, inferred_components)
              item = f"- {formatted} ([{short_sha}]({repo_url}/commit/{full_sha}))"

              included_commits += 1

              if new_modules:
                  for component in new_modules:
                      push_unique(new_module_updates, component, build_new_module_highlight(component, cleaned_subject))
              elif components:
                  for component in components:
                      push_unique(module_updates, component, build_module_update(kind, component, cleaned_subject))
              else:
                  generic_update = build_module_update(kind, "", cleaned_subject)
                  if generic_update and generic_update not in general_updates:
                      general_updates.append(generic_update)

              if kind == "feat":
                  technical_groups["Features"].append(item)
              elif kind == "fix":
                  technical_groups["Fixes"].append(item)
              elif kind in ("refactor", "perf"):
                  technical_groups["Improvements"].append(item)
              elif kind == "docs":
                  technical_groups["Documentation"].append(item)
              else:
                  technical_groups["Maintenance"].append(item)

          lines = []
          lines.append(f"## {current_tag}")
          lines.append("")

          if prev_tag:
              lines.append(f"Changes since **{prev_tag}**.")
          else:
              lines.append("Initial tagged release changes.")
          lines.append("")

          rendered_player_sections = bool(new_module_updates or module_updates or general_updates)

          if included_commits:
              lines.append("### Highlights")
              if new_module_updates:
                  lines.append(f"- New modules: {', '.join(new_module_updates.keys())}")
              if module_updates:
                  lines.append(f"- Updated modules: {', '.join(module_updates.keys())}")
              lines.append("")

          render_update_section(lines, "New Modules", new_module_updates)
          render_update_section(lines, "Module Updates", module_updates)

          if general_updates:
              lines.append("### General Improvements")
              for update in general_updates:
                  intro = update.get("intro", "").strip()
                  changes = update.get("changes", "").strip()
                  impact = update.get("impact", "").strip()
                  result = update.get("result", "").strip()

                  if intro:
                      lines.append(intro)
                  if changes:
                      lines.append(f"- What changed: {changes}")
                  if impact:
                      lines.append(f"- Why it matters: {impact}")
                  if result:
                      lines.append(f"- Overall: {result}")
                  lines.append("")
              lines.append("")

          should_render_technical = not (included_commits == 1 and rendered_player_sections)

          written_any = False
          if should_render_technical:
              for title in ("Features", "Fixes", "Improvements", "Documentation", "Maintenance"):
                  entries = technical_groups[title]
                  if not entries:
                      continue
                  written_any = True
                  lines.append(f"### Technical Notes: {title}")
                  lines.extend(entries)
                  lines.append("")

          if not written_any and not rendered_player_sections:
              lines.append("### Maintenance")
              lines.append("- Maintenance release.")
              lines.append("")

          if prev_tag:
              lines.append("### Full Changelog")
              lines.append(f"[{prev_tag}...{current_tag}]({repo_url}/compare/{prev_tag}...{current_tag})")
              lines.append("")

          Path("RELEASE_NOTES.md").write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ steps.resolve_tag.outputs.release_tag }}
          path: ${{ steps.prepare_asset.outputs.release_asset }}
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.release_tag }}
          name: Release ${{ steps.resolve_tag.outputs.release_tag }}
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          files: ${{ steps.prepare_asset.outputs.release_asset }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync README Links On Default Branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.resolve_tag.outputs.release_tag }}
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch }}"
          git fetch origin "${default_branch}"
          git checkout -B "readme-sync-${RELEASE_TAG}" "origin/${default_branch}"

          python3 - <<'PY'
          import glob
          import os
          import re
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          version = release_tag[1:]
          new_url = f"https://github.com/ThianYong-hub/DEVILS/releases/download/{release_tag}/devils-addon-{version}.jar"

          files = [Path("README.md")] + [Path(p) for p in glob.glob("docs/i18n/*.md")]
          url_re = re.compile(r"https://github\.com/ThianYong-hub/DEVILS/releases/download/v\d+\.\d+\.\d+/devils-addon-\d+\.\d+\.\d+\.jar")
          ver_plain_re = re.compile(r"\(v\d+\.\d+\.\d+\)")
          ver_backtick_re = re.compile(r"\(`v\d+\.\d+\.\d+`\)")

          for file in files:
            if not file.exists():
              continue
            text = file.read_text(encoding="utf-8")
            text = url_re.sub(new_url, text)
            text = ver_backtick_re.sub(f"(`v{version}`)", text)
            text = ver_plain_re.sub(f"(v{version})", text)
            file.write_text(text, encoding="utf-8")
          PY

          if git diff --quiet; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/i18n/*.md
          git commit -m "docs: sync README download link for ${RELEASE_TAG}"
          git push origin "HEAD:${default_branch}"
