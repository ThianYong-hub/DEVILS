name: Release From Tag
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag in format vX.Y.Z"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Resolve Release Tag
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${{ inputs.tag }}"

          if [[ ! "${release_tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid release tag '${release_tag}'. Expected format vX.Y.Z."
            exit 1
          fi

          echo "RELEASE_TAG=${release_tag}" >> "${GITHUB_ENV}"

      - name: Set APP_VERSION From Tag
        shell: bash
        run: |
          set -euo pipefail
          echo "APP_VERSION=${RELEASE_TAG#v}" >> "${GITHUB_ENV}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build with Gradle
        run: ./gradlew --no-daemon build -x test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ env.RELEASE_TAG }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/libs/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
