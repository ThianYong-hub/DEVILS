name: Manual Release Tag
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag in format vX.Y.Z"
        required: true
        type: string

permissions:
  contents: write
  actions: write

concurrency:
  group: release-tags
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Default Branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure Push Auth
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Validate And Create Tag
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "${INPUT_VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '${INPUT_VERSION}'. Expected format vX.Y.Z."
            exit 1
          fi

          git fetch --tags --force

          if git rev-parse -q --verify "refs/tags/${INPUT_VERSION}" >/dev/null; then
            echo "::error::Tag '${INPUT_VERSION}' already exists."
            exit 1
          fi

          git tag -a "${INPUT_VERSION}" -m "Release ${INPUT_VERSION}"
          git push origin "${INPUT_VERSION}"

      - name: Summary
        run: echo "Created manual release tag ${{ inputs.version }}"

      - name: Trigger Release Workflow
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.version }}
        run: |
          set -euo pipefail

          payload="$(printf '{"ref":"%s","inputs":{"tag":"%s"}}' "${GITHUB_REF_NAME}" "${RELEASE_TAG}")"

          curl -sS -L -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/release-on-tag.yml/dispatches" \
            -d "${payload}"
