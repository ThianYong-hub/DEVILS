name: Auto Patch Tag
on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-tags
  cancel-in-progress: false

jobs:
  create-patch-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure Push Auth
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_TOKEN:-}" ]]; then
            echo "::error::Missing required secret RELEASE_TOKEN."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Create Next Patch Tag With Retry
        id: create_tag
        shell: bash
        run: |
          set -euo pipefail

          get_latest_tag() {
            git tag -l 'v*' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n1 || true
          }

          calc_next_patch_tag() {
            local current="$1"

            if [[ -z "${current}" ]]; then
              echo "v0.0.1"
              return
            fi

            if [[ "${current}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              local major="${BASH_REMATCH[1]}"
              local minor="${BASH_REMATCH[2]}"
              local patch="${BASH_REMATCH[3]}"
              echo "v${major}.${minor}.$((patch + 1))"
              return
            fi

            echo "v0.0.1"
          }

          git fetch --tags --force

          existing_on_head="$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [[ -n "${existing_on_head}" ]]; then
            echo "Tag already exists on HEAD: ${existing_on_head}. Skipping auto-patch creation."
            echo "tag=${existing_on_head}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          attempts=10
          for attempt in $(seq 1 "${attempts}"); do
            latest_tag="$(get_latest_tag)"
            next_tag="$(calc_next_patch_tag "${latest_tag}")"

            echo "Attempt ${attempt}/${attempts}: latest='${latest_tag:-<none>}' next='${next_tag}'."

            if git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; then
              git fetch --tags --force
              sleep 1
              continue
            fi

            git tag -a "${next_tag}" -m "Release ${next_tag}"

            if git push origin "${next_tag}"; then
              echo "tag=${next_tag}" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            git tag -d "${next_tag}" || true
            git fetch --tags --force
            sleep 2
          done

          echo "::error::Failed to create patch tag after ${attempts} attempts."
          exit 1

      - name: Summary
        run: echo "Created or reused tag ${{ steps.create_tag.outputs.tag }}"
