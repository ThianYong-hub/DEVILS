name: Publish Development Build
on:
  push:
    branches-ignore:
      - main
    tags-ignore:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build with Gradle
        run: ./gradlew --no-daemon build -x test

      - name: Check addon jar contents
        shell: bash
        run: |
          set -euo pipefail
          addon_version="$(grep '^addon_version=' gradle.properties | cut -d= -f2)"
          addon_jar="build/libs/devils-addon-${addon_version}.jar"
          test -f "${addon_jar}" || { echo "::error::Missing ${addon_jar}"; exit 1; }

          jar_list="$(mktemp)"
          jar tf "${addon_jar}" > "${jar_list}"
          required_mixins=(
            "META-INF/devils-addon/mixins/addon-template.mixins.json"
            "META-INF/devils-addon/mixins/chesttracker.mixins.json"
            "META-INF/devils-addon/mixins/whereisit.mixins.json"
            "META-INF/devils-addon/mixins/searchables.mixins.json"
            "META-INF/devils-addon/mixins/searchables.fabric.mixins.json"
            "META-INF/devils-addon/mixins/yacl.mixins.json"
            "META-INF/devils-addon/mixins/yacl-fabric.mixins.json"
            "META-INF/devils-addon/mixins/xaerolib.mixins.json"
            "META-INF/devils-addon/mixins/xaerolib.fabric.mixins.json"
            "META-INF/devils-addon/mixins/xaerohud.mixins.json"
            "META-INF/devils-addon/mixins/xaerohud.fabric.mixins.json"
            "META-INF/devils-addon/mixins/xaerominimap.mixins.json"
            "META-INF/devils-addon/mixins/xaerominimap.fabric.mixins.json"
            "META-INF/devils-addon/mixins/xaeroworldmap.mixins.json"
            "META-INF/devils-addon/mixins/xaeroworldmap.fabric.mixins.json"
            "META-INF/devils-addon/mixins/xaeroplus.mixins.json"
            "META-INF/devils-addon/mixins/xaeroplus-fabric.mixins.json"
          )
          for path in "${required_mixins[@]}"; do
            grep -Fxq "${path}" "${jar_list}" || { echo "::error::Missing jar resource ${path}"; exit 1; }
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
